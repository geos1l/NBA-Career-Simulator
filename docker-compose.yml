services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  ingestion-cron:
    build: .
    volumes:
      - app-data:/app/data
    entrypoint: ["bash", "-c", "echo 'Waiting 24 hours before first run to avoid DB lock with initial ingestion...'; sleep 86400; while true; do echo \"[$(date)] Running weekly ingestion...\"; python scripts/ingest_data.py --active-only --force; echo \"[$(date)] Done. Sleeping 7 days.\"; sleep 604800; done"]
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - umami
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      APP_SECRET: 6131f68efb29d075032cd3b26d1dfc1629031a5107472e66369abcb8334a5170
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

  umami-db:
    image: postgres:15-alpine
    volumes:
      - umami-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  umami-data:
  app-data:
